name: 每日全球要闻快报

on:
  schedule:
    - cron: '0 10 * * *'    # 3:00 AM PDT (UTC-7) 提前触发，确保6点前就绪
    - cron: '0 11 * * *'    # 4:00 AM PDT / 3:00 AM PST 兜底
    - cron: '0 14 * * *'    # 6:00 AM PST (UTC-8, 冬令时兜底)
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run even if already ran today (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装中文字体和工具
        run: sudo apt-get install -y fonts-noto-cjk ghostscript --quiet

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 安装 Playwright Chromium
        run: playwright install chromium --with-deps

      - name: 检查运行条件
        id: check_run
        run: |
          LA_HOUR=$(TZ='America/Los_Angeles' date +%H)
          TODAY=$(TZ='America/Los_Angeles' date +%Y-%m-%d)
          echo "la_hour=$LA_HOUR, today=$TODAY"

          git fetch origin gh-pages --depth=1 2>/dev/null || true
          LAST_RUN=""
          if git rev-parse origin/gh-pages >/dev/null 2>&1; then
            LAST_RUN=$(git show origin/gh-pages:last_run_date.txt 2>/dev/null || echo "")
          fi
          echo "last_run_date=$LAST_RUN"

          # 今天已发送过 → 跳过（手动强制触发除外）
          FORCE="${{ github.event.inputs.force }}"
          if [ "$LAST_RUN" = "$TODAY" ] && [ "$FORCE" != "true" ]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "今日报告已生成（$TODAY），跳过"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # 手动触发：直接运行，不限时间窗口
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "手动触发，开始生成报告"
          elif [ "$LA_HOUR" -ge 2 ] && [ "$LA_HOUR" -le 8 ]; then
            # 定时触发：仅在 2-8 点时间窗口内执行
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "定时触发，LA时间 ${LA_HOUR}点，开始生成报告"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "非运行时间窗口（LA时间 ${LA_HOUR}点），跳过"
          fi

      - name: 恢复历史数据（报告 + 去重记录）
        if: steps.check_run.outputs.should_run == 'true'
        run: |
          mkdir -p output
          if git rev-parse origin/gh-pages >/dev/null 2>&1; then
            git archive origin/gh-pages | tar -x --wildcards 'report_*.html' -C output/ 2>/dev/null || true
            git show origin/gh-pages:seen_links.json > output/seen_links.json 2>/dev/null || true
            echo "seen_links.json lines: $(wc -l < output/seen_links.json 2>/dev/null || echo 0)"
          fi

      - name: 生成报告并发送邮件
        if: steps.check_run.outputs.should_run == 'true'
        env:
          GMAIL_SENDER:     ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD:   ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECIPIENTS: ${{ secrets.GMAIL_RECIPIENTS }}
        run: |
          python main.py
          TZ='America/Los_Angeles' date +%Y-%m-%d > output/last_run_date.txt

      - name: 部署到 GitHub Pages
        if: steps.check_run.outputs.should_run == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./output
          keep_files:   true
          commit_message: "报告 $(date +%Y-%m-%d)"
