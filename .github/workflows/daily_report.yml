name: 每日全球要闻快报

on:
  schedule:
    - cron: '0 13 * * *'    # 6:00 AM 洛杉矶 PDT (UTC-7, 夏令时 3月-11月)
    - cron: '0 14 * * *'    # 6:00 AM 洛杉矶 PST (UTC-8, 冬令时 11月-3月)
  workflow_dispatch:         # 允许手动触发

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装中文字体（matplotlib 图表用）
        run: sudo apt-get install -y fonts-noto-cjk --quiet

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 安装 Playwright Chromium
        run: playwright install chromium --with-deps

      - name: 检查洛杉矶时间（仅6点执行，防止双发）
        id: check_time
        run: |
          LA_HOUR=$(TZ='America/Los_Angeles' date +%H)
          echo "la_hour=$LA_HOUR"
          echo "la_hour=$LA_HOUR" >> $GITHUB_OUTPUT

      - name: 恢复历史数据（报告 + 去重记录）
        if: steps.check_time.outputs.la_hour == '06' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p output
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          if git rev-parse origin/gh-pages >/dev/null 2>&1; then
            git archive origin/gh-pages | tar -x --wildcards 'report_*.html' -C output/ 2>/dev/null || true
            git archive origin/gh-pages | tar -x 'seen_links.json' -C output/ 2>/dev/null || true
          fi

      - name: 生成报告并发送邮件
        if: steps.check_time.outputs.la_hour == '06' || github.event_name == 'workflow_dispatch'
        env:
          GMAIL_SENDER:     ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD:   ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECIPIENTS: ${{ secrets.GMAIL_RECIPIENTS }}
        run: python main.py

      - name: 部署到 GitHub Pages
        if: steps.check_time.outputs.la_hour == '06' || github.event_name == 'workflow_dispatch'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./output
          keep_files:   true
          commit_message: "报告 $(date +%Y-%m-%d)"
